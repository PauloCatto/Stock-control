<div class="categories-wrapper">

  <!-- Page Header -->
  <div class="page-header">
    <div class="page-title">
      <div class="page-title-icon">
        <i class="pi pi-tag"></i>
      </div>
      <div>
        <h1>Categorias</h1>
        <p>Organize seus produtos em categorias</p>
      </div>
    </div>
    <button class="add-btn" (click)="handleCategoryEvent(addCategoryAction)">
      <i class="pi pi-plus"></i>
      <span>Nova Categoria</span>
    </button>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-icon"><i class="pi pi-tags"></i></div>
      <div class="stat-info">
        <span class="stat-value">{{ categories.length }}</span>
        <span class="stat-label">Categorias Cadastradas</span>
      </div>
    </div>
  </div>

  <!-- Cards Grid -->
  <div class="categories-grid" *ngIf="categories.length > 0">
    <div class="category-card" *ngFor="let category of categories; let i = index">
      <div class="category-card-icon" [ngClass]="'color-' + (i % 6)">
        <i class="pi pi-tag"></i>
      </div>
      <div class="category-card-body">
        <h3 class="category-name">{{ category?.name }}</h3>
        <p class="category-id">ID: {{ category?.id | slice:0:8 }}…</p>
      </div>
      <div class="category-card-actions">
        <button class="action-btn edit-btn"
          pTooltip="Editar categoria" tooltipPosition="top"
          (click)="handleCategoryEvent(editCategoryAction, category?.id, category?.name)">
          <i class="pi pi-pencil"></i>
        </button>
        <button class="action-btn del-btn"
          pTooltip="Deletar categoria" tooltipPosition="top"
          (click)="handleDeleteCategoryEvent(category?.id || '', category?.name || '')">
          <i class="pi pi-trash"></i>
        </button>
      </div>
    </div>
  </div>

  <!-- Empty State -->
  <div class="empty-state" *ngIf="categories.length === 0">
    <div class="empty-icon"><i class="pi pi-inbox"></i></div>
    <h3>Nenhuma categoria encontrada</h3>
    <p>Crie sua primeira categoria para organizar seus produtos.</p>
    <button class="add-btn" (click)="handleCategoryEvent(addCategoryAction)">
      <i class="pi pi-plus"></i> Criar categoria
    </button>
  </div>

  <p-confirmDialog [style]="{ width: '50vw' }"></p-confirmDialog>
</div>
